pre-commit:
  parallel: true
  commands:
    gofumpt:
      glob: "*.go"
      run: gofumpt -l -w {staged_files}
      stage_fixed: true
    goimports:
      glob: "*.go"
      run: goimports -w -local github.com/shivangtanwar/kbark {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~1 ./...

pre-push:
  commands:
    test-short:
      run: go test -short -race -count=1 ./...

commit-msg:
  commands:
    conventional:
      run: |
        head -n1 {1} | grep -E '^(feat|fix|chore|docs|style|refactor|test|ci|build|perf|revert)(\(.+\))?!?: .{1,60}$' \
          || { echo "Commit subject must follow Conventional Commits (feat/fix/chore/docs/style/refactor/test/ci/build/perf/revert), <= 60 chars."; exit 1; }
