name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: envtest e2e (linux only)
        # Only on ubuntu — controller-runtime's envtest only publishes
        # binaries for linux + darwin, and we get equivalent coverage
        # from one OS. Build-tag gates the test from the default suite
        # above; this step opts in explicitly.
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ENVTEST_BIN="$(setup-envtest use 1.32 --bin-dir "$RUNNER_TEMP/envtest-bins" -p path)"
          mkdir -p .envtest-bins
          cp -R "$ENVTEST_BIN"/* .envtest-bins/
          go test -race -count=1 -tags=envtest ./internal/kube/...
